<main class="home-shell">

  <!-- ── Theme toggle ───────────────────────────────────────────────── -->
  <div class="home-theme-toggle-wrap">
    <app-theme-toggle></app-theme-toggle>
  </div>

  <!-- ── Logo / title ───────────────────────────────────────────────── -->
  <header class="home-header">
    <div class="logo-dots">
      <span class="dot dot-red"></span>
      <span class="dot dot-green"></span>
      <span class="dot dot-purple"></span>
    </div>
    <h1 class="home-title">SET</h1>
  </header>

  <!-- ── Mode cards ─────────────────────────────────────────────────── -->
  <div class="mode-grid">

    <!-- Single-player -->
    <section class="mode-card" (click)="startSinglePlayer()" role="button" tabindex="0"
             (keydown.enter)="startSinglePlayer()"
             (keydown.space)="$event.preventDefault(); startSinglePlayer()">
      <div class="mode-icon" aria-hidden="true">
        <svg viewBox="0 -960 960 960" fill="currentColor">
          <path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Zm0 400Z"/>
        </svg>
      </div>
      <h2 class="mode-title">Solo</h2>
      <p class="mode-desc">Play against yourself. Find as many SETs as you can before the deck runs out.</p>
      <div class="solo-card-footer">
        <a class="how-to-play-link" href="/how_to_play.pdf" target="_blank" rel="noopener noreferrer"
           title="How to Play SET"
           aria-label="How to play (opens in new tab)"
           (click)="$event.stopPropagation()"
           (keydown.enter)="$event.stopPropagation()"
           (keydown.space)="$event.stopPropagation()">How to play</a>
        <span class="mode-cta">Play Solo →</span>
      </div>
    </section>

    <!-- Multiplayer -->
    <section class="mode-card mode-card--multi">
      <div class="mode-icon" aria-hidden="true">
        <svg viewBox="0 -960 960 960" fill="currentColor">
          <path d="M40-160v-112q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q66 0 130 15.5T616-378q29 15 46.5 43.5T680-272v112H40Zm720 0v-120q0-44-24.5-84.5T666-434q51 6 96 20.5t84 35.5q36 20 55 44.5t19 53.5v120H760ZM247-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47Zm466 0q-47 47-113 47-11 0-28-2.5t-28-5.5q27-32 41.5-71t14.5-81q0-42-14.5-81T544-792q14-5 28-6.5t28-1.5q66 0 113 47t47 113q0 66-47 113ZM120-240h480v-32q0-11-5.5-20T580-306q-54-27-109-40.5T360-360q-56 0-111 13.5T140-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q440-607 440-640t-23.5-56.5Q393-720 360-720t-56.5 23.5Q280-673 280-640t23.5 56.5Q327-560 360-560t56.5-23.5ZM360-240Zm0-400Z"/>
        </svg>
      </div>
      <h2 class="mode-title">Multiplayer</h2>
      <p class="mode-desc">Race friend(s) to find SETs. Both players see every find in real time.</p>

      <div class="name-row">
        <label class="name-label" for="playerName">Your name:</label>
        <input
          id="playerName"
          class="name-input"
          type="text"
          placeholder="e.g. FunnyFish"
          maxlength="20"
          [(ngModel)]="playerName"
          aria-label="Your name"
        />
      </div>

      <div class="players-row">
        <label class="players-label" for="maxPlayers">Players:</label>
        <select id="maxPlayers" class="players-select" [(ngModel)]="maxPlayers">
          <option *ngFor="let n of playerCountOptions" [value]="n">{{ n }}</option>
        </select>
      </div>

      <button class="btn btn-primary" (click)="createRoom()">Create room</button>

      <div class="join-row">
        <input
          #roomInput
          class="join-input"
          type="text"
          placeholder="Room code"
          maxlength="12"
          (keydown.enter)="joinRoom(roomInput.value)"
          aria-label="Room code"
        />
        <button class="btn btn-secondary" (click)="joinRoom(roomInput.value)">Join</button>
      </div>
    </section>

  </div>
  <footer class="home-footer">
    <ng-container *ngIf="!statsReady"><span class="stats-loading">loading stats…</span></ng-container>
    <ng-container *ngIf="statsReady && gamesPlayed !== null">{{ gamesPlayed | number }} games played</ng-container>
    <ng-container *ngIf="statsReady && gamesPlayed === null">— games played</ng-container>
  </footer>

</main>
