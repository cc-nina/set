name: Deploy Backend
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret is set
        run: |
          if [ -z "${{ secrets.GCP_SSH_KEY }}" ]; then
            echo "GCP_SSH_KEY is empty!"
          else
            echo "GCP_SSH_KEY is set."
          fi
      - name: SSH and Update VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 34.44.229.168
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          debug: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            cd ~/set

            # Save hash of package.json before pulling
            OLD_HASH=$(md5sum package.json | awk '{print $1}')

            git pull

            # Only run npm ci if package.json actually changed
            NEW_HASH=$(md5sum package.json | awk '{print $1}')
            if [ "$OLD_HASH" != "$NEW_HASH" ]; then
              echo "package.json changed — running npm ci"
              npm ci --no-audit --no-fund
            else
              echo "package.json unchanged — skipping npm ci"
            fi

            npm run build
            pm2 restart game-backend
            grep -qf ~/.ssh/gcp_deploy_key.pub ~/.ssh/authorized_keys || cat ~/.ssh/gcp_deploy_key.pub >> ~/.ssh/authorized_keys

